<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel & Cana | Kiosk Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="mequi-header">
    <div class="header-content">
        <div class="logo">🥟 <span>Pastel</span> & Cana</div> 
    </div>
</header>

<main class="kiosk-container">
    <section class="hero-banner">
        <div class="carousel-container">
            <div id="hero-slider" class="slider-wrapper"></div>
            <div class="carousel-controls">
                <button class="prev-btn">❮</button>
                <button class="next-btn">❯</button>
            </div>
        </div>
    </section>

    <nav class="category-nav"></nav>

    <div class="section-header">
        <h2 id="section-title" class="section-title">Todos os Produtos</h2>
        <span class="view-all" onclick="renderProdutos('todos')">Ver tudo ➔</span>
    </div>
    
    <div id="product-grid" class="mequi-grid"></div>
</main> 

    <script src="database.js"></script>
    <script src="script.js"></script>
</body>
</html>
